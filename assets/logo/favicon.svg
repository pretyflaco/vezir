<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="32" height="32" role="img" aria-label="vezir">
  <!--
    Favicon variant. Aggressively simplified for 16/32px:
      - 3-peak crown (instead of 5) so peaks survive downsampling
      - Same accent dot for brand recognition
      - Bolder proportions overall
  -->
  <g fill="#111111">
    <!-- 3-peak crown -->
    <path d="M 64 96 L 64 56 L 96 56 L 112 80 L 128 56 L 144 80 L 160 56 L 192 56 L 192 96 Z"/>
    <!-- Stem -->
    <path d="M 88 96 L 168 96 L 184 200 L 72 200 Z"/>
    <!-- Plinth -->
    <rect x="48" y="200" width="160" height="32" rx="8" ry="8"/>
  </g>
  <circle cx="128" cy="32" r="16" fill="#FF6B35"/>
</svg>
